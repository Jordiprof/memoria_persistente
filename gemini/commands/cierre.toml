description = "Cierra la sesión: guarda journal, tareas, estado y hace commit"
prompt = """
Fecha de hoy (real): !{date +%Y-%m-%d}
Hora: !{date +%H:%M}

Ejecuta el RITUAL DE CIERRE de ./AGENTS.md:
1. Razonamiento de máximo 3 líneas.
2. APPEND al journal de hoy (## Hecho / ## Decisiones / ## Mañana); ACTUALIZA memory/TASKS.md;
   REESCRIBE memory/STATE.md (breve); PROMOCIÓN a memory/knowledge/ si aplica.
3. git add memory/ && git commit -m "memoria: cierre <HOY>" (SOLO memory/).
4. Ejecuta git status --short: si hay cambios FUERA de memory/, avisa al usuario en una línea (sin commitearlos tú).

Usa únicamente la fecha/hora reales de arriba.
"""
