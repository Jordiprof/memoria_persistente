description = "Captura una nota rápida en el journal de hoy"
prompt = """
Hora real del sistema (no la inventes): !{date +%H:%M}
Fecha de hoy: !{date +%Y-%m-%d}

Ejecuta el RITUAL DE NOTA de ./AGENTS.md: añade `- {HORA} — {texto}` al final de ## Notas del
journal de hoy (./memory/journal/<HOY>.md); créalo desde __KIT_HOME__/templates/journal.md si
falta. No hagas commit.

Texto de la nota: {{args}}
"""
